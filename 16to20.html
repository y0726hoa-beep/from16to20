<!DOCTYPE html>

    <style>
        :root { --rose: #a67c84; --deep: #3d2b2f; --perfect: #2e7d32; --normal: #ef6c00; --unfamiliar: #b71c1c; }
        body { font-family: 'PingFang TC', sans-serif; background: #fffdfd; margin: 0; padding: 15px; color: #000; }
        .container { max-width: 800px; margin: auto; }
        .header-tools { position: sticky; top: 0; background: #fffdfd; padding: 10px 0; z-index: 100; border-bottom: 3px solid var(--rose); }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid var(--rose); border-radius: 10px; font-size: 16px; outline: none; }
        .nav-tabs { display: flex; margin: 15px 0; border-radius: 10px; overflow: hidden; border: 2px solid var(--rose); }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; background: #fdf2f4; color: var(--rose); }
        .tab.active { background: var(--rose); color: white; }
        .filter-buttons { display: flex; gap: 6px; justify-content: center; margin-bottom: 15px; }
        .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--rose); cursor: pointer; font-weight: bold; background: #fff; color: var(--rose); font-size: 13px; }
        .filter-btn.active { background: var(--deep); color: white; border-color: var(--deep); }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        .card { height: 240px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; background: #fff; border-radius: 20px; padding: 15px; border: 3px solid var(--deep); box-shadow: 0 4px 10px rgba(0,0,0,0.05); box-sizing: border-box; }
        .card-back { transform: rotateY(180deg); background: #fdfafb; }
        .front-main { flex-grow: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .word-eng { font-size: 28px; font-weight: 900; color: #000; line-height: 1.1; }
        .word-kk { font-size: 15px; color: #555; font-weight: bold; margin-top: 5px; }
        .word-pos { font-size: 13px; color: var(--rose); font-style: italic; margin-top: 2px; }
        .front-footer { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .quiz-item { background: #fff; padding: 15px; margin-bottom: 12px; border-radius: 15px; border: 2px solid var(--rose); }
        .quiz-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; font-weight: bold; font-size: 16px; }
        .quiz-input-area { background: #fdf2f4; padding: 12px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .spell-input { padding: 10px; width: 90%; border: 2px solid var(--deep); border-radius: 8px; font-size: 18px; text-align: center; outline: none; }
        .spell-input.correct { border-color: var(--perfect); background: #e8f5e9; }
        .spell-input.wrong { border-color: var(--unfamiliar); background: #ffebee; }
        .btn-status { border: 1.5px solid var(--rose); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; color: var(--rose); background: #fff; transition: 0.2s; }
        .btn-status.selected { background: var(--rose); color: white; transform: scale(1.05); }
        .ans-btn { background: #8e1515; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .ans-text { display: none; color: #000; font-size: 20px; font-weight: 900; margin-left: 10px; border-bottom: 3px solid #000; }
        .hidden-hint { background: var(--rose); color: transparent; padding: 1px 8px; border-radius: 5px; cursor: help; font-size: 13px; }
        .hidden-hint:hover { background: transparent; color: var(--rose); }
        .section { display: none; } .section.active { display: block; }
    </style>
</head>

function speak(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
function setS(w, s) { if(states[w]===s) delete states[w]; else states[w]=s; localStorage.setItem('vNewDataWithKK', JSON.stringify(states)); render(); }
function getH(w) { return w.split(' ').map(p => p.length<=1?p:p[0]+"_".repeat(p.length-2)+p[p.length-1]).join(' '); }
function ans(i, c) {
    const input = document.getElementById('i'+i), txt = document.getElementById('a'+i), btn = document.getElementById('b'+i);
    if(txt.style.display==='inline') { txt.style.display='none'; btn.innerText='查看解答'; input.className='spell-input'; }
    else { txt.style.display='inline'; btn.innerText='收回解答'; input.className = (input.value.trim().toLowerCase()===c.toLowerCase()?'spell-input correct':'spell-input wrong'); }
}
function render() {
    const q = document.getElementById('s').value.toLowerCase(), g = document.getElementById('grid'), l = document.getElementById('list');
    g.innerHTML = ''; l.innerHTML = '';
    data.forEach((w, i) => {
        const s = states[w.e] || 'none';
        if((filter === 'all' || s === filter) && (w.e.includes(q) || w.c.includes(q))) {
            const div = document.createElement('div'); div.className = 'card';
            div.innerHTML = `<div class="card-inner" onclick="this.parentElement.classList.toggle('flipped')">
                <div class="card-front"><div class="front-main"><div class="word-eng">${w.e}</div><div class="word-kk">${w.k}</div><div class="word-pos">${w.p}</div></div>
                <div class="front-footer"><div style="font-size:22px; cursor:pointer" onclick="event.stopPropagation(); speak('${w.e}')">🔊</div>
                <div class="filter-buttons" style="margin-top:8px"><button class="btn-status ${s==='p'?'selected':''}" onclick="event.stopPropagation(); setS('${w.e}','p')">完美</button><button class="btn-status ${s==='n'?'selected':''}" onclick="event.stopPropagation(); setS('${w.e}','n')">普通</button><button class="btn-status ${s==='u'?'selected':''}" onclick="event.stopPropagation(); setS('${w.e}','u')">不熟</button></div></div></div>
                <div class="card-back"><div class="front-main"><b style="font-size:22px; color:#000;">${w.c}</b><hr style="width:100%; border:1.5px solid var(--rose); margin:12px 0;"><div style="color:var(--deep); font-weight:bold; font-size:14px; text-align:center;">${w.d ? '用法：<br>' + w.d : ''}</div></div></div></div>`;
            g.appendChild(div);
            const qdiv = document.createElement('div'); qdiv.className = 'quiz-item';
            qdiv.innerHTML = `<div class="quiz-header"><b>${w.c}</b> <span style="color:#666; font-size:13px">${w.k} ${w.p}</span> <span style="cursor:pointer" onclick="speak('${w.e}')">🔊</span> <span class="hidden-hint">${getH(w.e)}</span>
                <div style="margin-left:auto" class="filter-buttons"><button class="btn-status ${s==='p'?'selected':''}" onclick="setS('${w.e}','p')">完美</button><button class="btn-status ${s==='n'?'selected':''}" onclick="setS('${w.e}','n')">普通</button><button class="btn-status ${s==='u'?'selected':''}" onclick="setS('${w.e}','u')">不熟</button></div></div>
                <div class="quiz-input-area"><input type="text" class="spell-input" id="i${i}" placeholder="挑戰正確拼寫..."><div style="display:flex; align-items:center; margin-top:5px;"><button class="ans-btn" id="b${i}" onclick="ans(${i},'${w.e.replace(/'/g, "\\'")}')">查看解答</button><span class="ans-text" id="a${i}">${w.e}</span></div></div>`;
            l.appendChild(qdiv);
        }
    });
}
render();
</script>
